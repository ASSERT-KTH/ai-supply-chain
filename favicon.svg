<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .link-chain { fill: none; stroke: #0F6E56; stroke-width: 8; stroke-linecap: round; }
      .link-bg { fill: #E1F5EE; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" class="link-bg" rx="8"/>
  <!-- Chain link -->
  <g class="link-chain">
    <!-- Left link -->
    <circle cx="30" cy="50" r="16"/>
    <!-- Right link -->
    <circle cx="70" cy="50" r="16"/>
    <!-- Connection -->
    <line x1="46" y1="50" x2="54" y2="50"/>
  </g>
</svg>